services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8080:8080"
    volumes:
      - ~/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    command: >
      --model /models/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 32768
      --parallel 4
      --n-gpu-layers 999
      --flash-attn on
      --jinja
      --threads 8
      --chat-template-kwargs '{"enable_thinking": false}'

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://llama-server:8080/v1
    restart: unless-stopped
    depends_on:
      - llama-server

volumes:
  open-webui-data:
